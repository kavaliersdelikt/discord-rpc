name: Build Windows EXE

permissions:
  contents: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Electron builder binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-binaries-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-binaries-

      - name: Install dependencies
        run: npm ci

      - name: Package Windows executable
        run: npm run package:win

      - name: Determine release version
        id: version
        shell: bash
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          MAJOR_MINOR=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          FULL_VERSION="v${MAJOR_MINOR}.${GITHUB_RUN_NUMBER}"
          EXE_FILE="RPC-Manager-${BASE_VERSION}.exe"
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "exe_file=$EXE_FILE" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.full_version }}
          release_name: Release ${{ steps.version.outputs.full_version }}
          body: |
            Automatic build from commit ${{ github.sha }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/builder/${{ steps.version.outputs.exe_file }}
          asset_name: RPC-Manager-${{ steps.version.outputs.full_version }}.exe
          asset_content_type: application/octet-stream
